name: Build and Test
on:
  push:
    branches: [ main ]
  

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v2
         
        - name: build frontend
          run: |
            cd frontend
            npm install
            npm run build
    
    deploy:
        needs: build
        runs-on: ubuntu-latest
        
        name: SSh in server and deploy
        steps:
        - name: SSH and deploy
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.SERVER_HOST }}
            username: ${{ secrets.SERVER_USER }}
            key: ${{ secrets.SERVER_SSH_KEY }}
            script: |
              cd /Campus_Tales
              git pull origin main
              cd frontend
              npm install
              npm run build
              rm -rf /var/www/html/*
              cp -r dist/* /var/www/html/
              cd ../backend 
              npm install
              pm2 restart all

          